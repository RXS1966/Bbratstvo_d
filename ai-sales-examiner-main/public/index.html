<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AI-Chat + Live Avatar</title>

  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ====== базовая сетка ====== */
    .main{display:grid;grid-template-columns:minmax(420px,1fr) minmax(480px,1.2fr);gap:20px;padding:16px;align-items:start}
    .avatar-col{display:flex;flex-direction:column;min-height:0;} /* ВАЖНО */
    .avatar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .title{font-weight:600}
    .status{display:flex;align-items:center;gap:8px;font-size:.95rem}
    .status .dot{width:10px;height:10px;border-radius:50%;background:#ef4444;box-shadow:0 0 10px rgba(239,68,68,.6)}
    .status.on .dot{background:#22c55e;box-shadow:0 0 10px rgba(34,197,94,.65)}
    .chat-container{min-height:360px}
    .input-container{display:flex;gap:8px;align-items:flex-start}
    #message-input{flex:1;min-height:64px;font-size:16px;line-height:1.35;padding:10px 12px;resize:vertical}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid #2b3b55;background:#0a1222;color:#eef1f6;cursor:pointer;transition:.15s}
    .btn.primary{background:#1e293b}
    .btn:hover{filter:brightness(1.05)}
    #avatar-toggle.off{background:#1e293b}
    #avatar-toggle.on{background:#ef476f;color:#fff}
    .session-footer{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px;border:1px solid #1e293b;background:#0b1324;border-radius:12px;margin-top:8px;color:#cfe3ff}

    /* ====== переключатель темы ====== */
    #themeToggle{border:1px solid #2b3b55;background:#0a1222;color:#eef1f6;padding:8px 10px;border-radius:10px;cursor:pointer}
    #themeToggle:hover{filter:brightness(1.08)}
    #themeIcon{font-size:14px}

    /* ====== тёмная тема ====== */
    html[data-theme="dark"] body{background:#0e1116;color:#e5e7eb}
    html[data-theme="dark"] .btn{background:#111827;border-color:#2b3547;color:#e5e7eb}
    html[data-theme="dark"] .btn.primary{background:#1f2937}
    html[data-theme="dark"] .session-footer{background:#121a2a;border-color:#2a3448;color:#d5e4ff}
    html[data-theme="dark"] #message-input{background:#101826;color:#e5e7eb;border-color:#2a3448}
    html[data-theme="dark"] .status .text{color:#cfd8e3}

    /* ====== адаптив ====== */
    @media (max-width: 1100px){
      .main{grid-template-columns:1fr;gap:16px}
      .avatar-col{order:1}
      .chat-wrapper{order:2}
    }
    @media (max-width: 768px){
      #message-input{min-height:56px}
      .session-footer{flex-direction:column;align-items:stretch}
      .session-footer .info{margin-bottom:6px}
    }
    @media (max-width: 420px){
      .btn{padding:9px 12px}
      #message-input{min-height:48px}
    }

    /* ====== ЛЕВО: видео-бокс ====== */
    .video-box{
      width:100%;
      aspect-ratio:16/9;
      border-radius:16px;
      overflow:hidden;
      background:#0d1424;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    .video-box video{width:100%;height:100%;object-fit:cover;display:block}

    /* ====== ВИДЕО + КНОПКА "Аватар" СПРАВА ====== */
    .video-row{
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .video-row .video-box{
      flex:0 0 50%;
      max-width:50%;
    }
    .avatar-actions{
      flex:1 1 auto;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
    }
    #avatar-toggle{
      height:44px;
      padding:0 14px;
      border-radius:12px;
      white-space:nowrap;
    }

    /* ====== ВИТРИНА (СТАБИЛЬНАЯ, СО СКРОЛЛОМ ВНУТРИ) ====== */
    .catalog-wrap{
      margin-top:12px;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#0d1424;
      box-shadow:0 10px 30px rgba(0,0,0,.25);

      /* ВАЖНО: НЕ display:none — иначе высоты/скролл часто ломаются */
      display:flex;
      flex-direction:column;
      min-height:0;
      flex:1 1 auto; /* занимает остаток под аватаром */
    }

    .catalog-head{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(13,20,36,.95);
    }
    .catalog-title{font-weight:700;color:#e5e7eb}

    /* СКРОЛЛ — именно тут */
    #catalog-mount{
      flex:1 1 auto;
      min-height:0;
      overflow-y:auto;
      overflow-x:hidden;
      padding:12px;
      box-sizing:border-box;
      color:#e5e7eb;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
    }

    /* Свернули: не прячем весь блок, а сворачиваем тело */
    .catalog-wrap.is-collapsed #catalog-mount{
      max-height:0;
      padding-top:0;
      padding-bottom:0;
      overflow:hidden;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.7.5/dist/livekit-client.umd.min.js" crossorigin="anonymous"></script>

</head>

  <script>
    // Разблок аудио по клику
    (function () {
      function unlock() {
        try {
          const a = document.getElementById('avatar-audio');
          if (a) { a.muted = false; a.play().catch(()=>{}); }
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) { try { const ctx = new AC(); if (ctx.state === 'suspended') ctx.resume(); } catch {} }
        } catch {}
        window.removeEventListener('click', unlock, true);
      }
      window.addEventListener('click', unlock, true);
    })();

    // Свернуть/развернуть витрину (НЕ трогаем display)
    (function(){
      const wrap = document.getElementById("catalog-wrap");
      const btn = document.getElementById("catalog-hide");
      if (!wrap || !btn) return;

      btn.addEventListener("click", () => {
        const collapsed = wrap.classList.toggle("is-collapsed");
        btn.textContent = collapsed ? "Развернуть" : "Свернуть";
      });
    })();
  </script>

  <script>
    (function(){
      const el=document.getElementById('avatar-status'); const txt=el?.querySelector('.text');
      function refresh(){
        const enabled=!!(window.AVATAR_ENABLED && window.avatarStream?.enabled);
        el?.classList.toggle('on',enabled); el?.classList.toggle('off',!enabled);
        if (txt) txt.textContent = enabled ? 'аватар включён' : 'аватар выключен';
      }
      refresh(); setInterval(refresh,1000); window.addEventListener('focus',refresh);
    })();

    (function themeInit(){
      const root = document.documentElement;
      const btn = document.getElementById('themeToggle');
      const icon = document.getElementById('themeIcon');

      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const initial = saved || (prefersDark ? 'dark' : 'light');
      apply(initial);

      btn?.addEventListener('click', () => {
        const next = (root.getAttribute('data-theme') === 'dark') ? 'light' : 'dark';
        apply(next, true);
      });

      function apply(mode, remember=true){
        root.setAttribute('data-theme', mode === 'dark' ? 'dark' : 'light');
        if (icon) icon.textContent = (mode === 'dark') ? '☀️' : '🌙';
        if (remember) localStorage.setItem('theme', mode);
      }
    })();
  </script>

  (function(){

    btn.addEventListener("click", () => {

  // 2) Wheel-trap: чтобы колёсико работало внутри витрины, а не “передавалось” наружу
  (function(){
    const m = document.getElementById("catalog-mount");
    if (!m) return;

    m.addEventListener("wheel", (e) => {
      const canScroll = m.scrollHeight > m.clientHeight;
      if (!canScroll) return;

      const up = e.deltaY < 0;
      const atTop = m.scrollTop <= 0;
      const atBottom = (m.scrollTop + m.clientHeight) >= (m.scrollHeight - 1);

      // Если мы НЕ на границе — блокируем прокрутку страницы/родителя
      if ((!atTop && up) || (!atBottom && !up)) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, { passive: false });
  })();
